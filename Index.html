<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Forum</title>

<!-- Styles -->
<style>
  /* GENERAL LAYOUT */
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f2f5;
    color: #333;
  }

  .container {
    max-width: 700px;
    margin: auto;
    padding: 15px;
  }

  h1 {
    text-align: center;
    color: #6b5b95;
    margin-bottom: 20px;
  }

  /* CARD STYLES */
  .card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.05);
  }

  .card .meta {
    font-size: 0.85em;
    color: #666;
    margin-bottom: 8px;
  }

  /* TEXT INPUTS */
  textarea, input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    resize: none;
  }

  button {
    padding: 8px 12px;
    margin-top: 6px;
    border: none;
    border-radius: 8px;
    background: #6b5b95;
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #58487c;
  }

  .like-btn, .report-btn, .comment-btn {
    font-size: 0.9em;
    margin-right: 6px;
  }

  .hot {
    color: orange;
    font-weight: bold;
  }

  /* COMMENTS */
  .comment {
    font-size: 0.85em;
    margin-top: 6px;
    padding-left: 10px;
    border-left: 2px solid #ccc;
  }

  .comment-username {
    font-weight: bold;
  }

  /* TRENDING SECTION */
  #trending {
    margin-bottom: 20px;
  }

  .trending-card {
    background: #ffe3f1;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
  }

</style>
</head>
<body>

<div class="container">

  <h1>Anonymous Forum</h1>

  <!-- POST CREATION -->
  <div class="card">
    <textarea id="postText" placeholder="Write something..."></textarea>
    <select id="postCategory">
      <option>General</option>
      <option>Questions</option>
      <option>Advice</option>
      <option>Funny</option>
      <option>Other</option>
    </select>
    <button onclick="postMessage()">Post</button>
    <p id="msg"></p>
  </div>

  <!-- TRENDING SECTION -->
  <div id="trending">
    <h3>🔥 Trending</h3>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

</div>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
/* ----------------- CONFIG ----------------- */
const SUPABASE_URL = "https://yeykaczrwecjoamerfyy.supabase.co";
const SUPABASE_KEY = "sb_publishable_DiJT4uHXCJsmv6YaKZgRig_d18gxMab"; // Public key safe for client
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ----------------- ANONYMOUS USER ----------------- */
function getUser() {
  let uid = localStorage.getItem("uid");
  if(!uid){
    uid = "u_"+Math.random().toString(36).slice(2);
    localStorage.setItem("uid", uid);
  }
  return uid;
}

/* ----------------- SMART FILTER (SAFE FOR GENERAL USE) ----------------- */
const badPatterns = [
  /z[a@]m[e3]l/i,
  /9a[h7]ba/i,
  /zbi/i,
  /qwad/i,
  /m9w[a@]da/i,
  /klb/i,
  /hmar/i
];

function sanitize(text){
  badPatterns.forEach(p=>{
    text = text.replace(p,"***");
  });
  return text;
}

/* ----------------- POST COOLDOWN & DAILY LIMIT ----------------- */
function canPost() {
  const lastPost = localStorage.getItem("last_post");
  if(lastPost && Date.now() - lastPost < 300000){ // 5 min cooldown
    return false;
  }
  localStorage.setItem("last_post", Date.now());
  return true;
}

/* ----------------- POST MESSAGE ----------------- */
async function postMessage(){
  const content = document.getElementById("postText").value.trim();
  const category = document.getElementById("postCategory").value;
  const user = getUser();

  if(!content) return;
  if(!canPost()){
    msg.innerText = "Please wait 5 minutes before posting again.";
    return;
  }

  // Check daily limit (3 posts per day)
  const today = new Date().toISOString().split("T")[0];
  const { data } = await db.from("posts")
    .select("*")
    .eq("user_id", user)
    .gte("created_at", today);

  if(data.length >= 3){
    msg.innerText = "Daily limit reached (3 posts).";
    return;
  }

  // Insert post
  await db.from("posts").insert([{
    content: sanitize(content),
    category: category,
    user_id: user
  }]);

  document.getElementById("postText").value = "";
  loadPosts();
}

/* ----------------- LIKE POST ----------------- */
async function likePost(id, likes){
  await db.from("posts").update({likes: likes+1}).eq("id", id);
}

/* ----------------- REPORT POST ----------------- */
async function reportPost(id, reports){
  await db.from("posts").update({reports: reports+1}).eq("id", id);
  alert("Reported");
}

/* ----------------- RANDOM NAMES FOR COMMENTS ----------------- */
const anonNames = ["Curious Fox","Mysterious Cat","Quiet Owl","Hidden Wolf","Secret Tiger"];

/* ----------------- ADD COMMENT ----------------- */
async function addComment(postId){
  const input = document.getElementById("commentInput-"+postId);
  const text = input.value.trim();
  if(!text) return;

  const username = anonNames[Math.floor(Math.random()*anonNames.length)];

  await db.from("comments").insert([{
    post_id: postId,
    content: sanitize(text),
    username: username
  }]);

  input.value = "";
  loadComments(postId);
}

/* ----------------- LOAD COMMENTS ----------------- */
async function loadComments(postId){
  const { data } = await db.from("comments").select("*").eq("post_id", postId).order("created_at",{ascending:true});
  const div = document.getElementById("comments-"+postId);
  div.innerHTML = "";
  data.forEach(c=>{
    div.innerHTML += `<div class="comment"><span class="comment-username">${c.username}:</span> ${c.content}</div>`;
  });
}

/* ----------------- LOAD POSTS ----------------- */
async function loadPosts(){
  const { data } = await db.from("posts").select("*").order("created_at",{ascending:false});
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.forEach(p=>{
    if(p.reports >= 5) return; // hide toxic

    const hot = p.likes >= 5 ? "🔥 HOT" : "";

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <p>${p.content}</p>
      <div class="meta">${p.category} ${hot}</div>
      ❤️ ${p.likes}
      <button class="like-btn" onclick="likePost('${p.id}',${p.likes})">Like</button>
      <button class="report-btn" onclick="reportPost('${p.id}',${p.reports || 0})">Report</button>

      <div id="comments-${p.id}"></div>
      <input id="commentInput-${p.id}" placeholder="Reply..." />
      <button class="comment-btn" onclick="addComment('${p.id}')">Send</button>
    `;

    feed.appendChild(div);
    loadComments(p.id);
  });

  // Load trending (top 3 by likes today)
  const today = new Date().toISOString().split("T")[0];
  const { data: trend } = await db.from("posts")
    .select("*")
    .gte("created_at", today)
    .order("likes",{ascending:false})
    .limit(3);

  const tdiv = document.getElementById("trending");
  tdiv.innerHTML = "<h3>🔥 Trending</h3>";
  trend.forEach(p=>{
    tdiv.innerHTML += `<div class="trending-card">${p.content}</div>`;
  });
}

/* ----------------- AUTO REFRESH ----------------- */
setInterval(loadPosts, 5000);
loadPosts();

</script>

</body>
</html>
